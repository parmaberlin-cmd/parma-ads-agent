openapi: 3.1.0

info:
  title: Parma Growth Operator
  version: 1.0.0

servers:
  - url: https://supportive-stillness-production-ec37.up.railway.app

paths:

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: OK

  /meta/campaigns:
    get:
      operationId: listCampaigns
      summary: List Meta campaigns
      responses:
        "200":
          description: OK

  /meta/campaign/{id}/structure:
    get:
      operationId: getCampaignStructure
      summary: Get campaign structure
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /tools/campaign/{id}/metrics:
    get:
      operationId: getCampaignMetrics
      summary: Get campaign metrics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

components:
  schemas: {}
