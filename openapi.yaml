 openapi: 3.1.0
info:
  title: Parma Growth Operator
  version: 1.0.0

servers:
  - url: https://supportive-stillness-production-ec37.up.railway.app

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: OK

  /meta/campaigns:
    get:
      operationId: listCampaigns
      summary: List Meta campaigns
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Campaign list

  /meta/campaign/{id}/stop:
    get:
      operationId: pauseCampaign
      summary: Pause campaign
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign paused

  /meta/campaign/{id}/start:
    get:
      operationId: startCampaign
      summary: Start campaign
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign started

  /meta/campaign/{id}/structure:
    get:
      operationId: getCampaignStructure
      summary: Get campaign structure
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign structure

  /tools/campaign/{id}/metrics:
    get:
      operationId: getCampaignMetrics
      summary: Get campaign metrics
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign metrics

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
